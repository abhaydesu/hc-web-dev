<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>login page</title>
    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
            background-color: #1a1a1a;
            color: white;
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .card {
            background-color: #b4adad;
            color: black;
            padding : 90px 200px;
            border-radius: 10px;
        }

        form {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        h2 {
            color: #1a1a1a;
            text-align: center;
            margin-bottom: 50px;
        }

        input {
            margin-bottom: 15px;
            padding: 10px;
            border-radius: 8px;

        }
        button {
            background-color: #1b81da;
            color: white;
            padding: 10px;
            border-radius: 8px;
        }

        button:hover {
            background-color: #0d4c83;
            cursor: pointer;
            transition: background-color 0.9s ease-out;
        }
    </style>
</head>
<body>
    <div class="card">
        <h2 >Login</h2>
        <form action="">
            <input type="email" name="" id="" placeholder="email">
            <input type="password" name="" id="" placeholder="password">
            <button type="submit">Login</button>
        </form>
    </div>
</body>
</html>
